# Docker Compose configuration for monitoring stack
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: jadslink_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - jadslink_network
    depends_on:
      - api

  loki:
    image: grafana/loki:latest
    container_name: jadslink_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    networks:
      - jadslink_network

  grafana:
    image: grafana/grafana:latest
    container_name: jadslink_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - jadslink_network
    depends_on:
      - prometheus
      - loki

  promtail:
    image: grafana/promtail:latest
    container_name: jadslink_promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    networks:
      - jadslink_network
    depends_on:
      - loki

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  jadslink_network:
    driver: bridge
