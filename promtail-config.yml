# Promtail configuration for shipping logs to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
      - labels:
          stream:
      - output:
          source: log

  # JADSlink API logs (from docker compose)
  - job_name: jadslink-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: jadslink-api
          service: api
    relabel_configs:
      - source_labels: [__path__]
        regex: '.*jadslink_api.*'
        action: keep
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            environment: environment
      - labels:
          level:
          logger:
      - output:
          source: message
